<div class="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/35 p-5 backdrop-blur-sm" (click)="close()">
  <div class="w-full max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-2xl" (click)="$event.stopPropagation()">
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h3 class="text-4xl font-extrabold tracking-tight text-on-background">Create Feature</h3>
        <p class="mt-2 text-sm text-on-surface-variant">Define a new functional component for your automation suite.</p>
        <p *ngIf="moduleName" class="mt-1 text-xs font-semibold text-primary">Module: {{ moduleName }}</p>
      </div>
      <button type="button" (click)="close()" class="inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-400 transition-colors hover:bg-slate-100 hover:text-slate-700" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div *ngIf="errorMessage" class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ errorMessage }}
    </div>

    <div *ngIf="!isRoleLoaded" class="py-10 text-center text-sm text-slate-500">Loading...</div>

    <div *ngIf="isRoleLoaded && !canCreate()" class="py-10 text-center">
      <span class="material-symbols-outlined text-4xl text-slate-300">lock</span>
      <p class="mt-3 text-sm text-slate-500">You do not have permission to create features.</p>
      <button type="button" (click)="close()" class="mt-4 rounded-xl px-5 py-2 text-sm font-bold text-slate-600 transition-colors hover:bg-slate-100">Close</button>
    </div>

    <form *ngIf="isRoleLoaded && canCreate()" [formGroup]="featureForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500">Module <span class="text-red-500">*</span></label>
        <select formControlName="selectedModule" class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm text-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20" [disabled]="loadingModules || !modules.length">
          <option value="">Select module...</option>
          <option *ngFor="let m of modules" [value]="m.id">{{ m.name }}</option>
        </select>
        <p *ngIf="!loadingModules && !modules.length" class="mt-2 text-xs text-slate-400">No modules found. Create a module first.</p>
      </div>

      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500">Feature Name <span class="text-red-500">*</span></label>
        <input type="text" formControlName="name" placeholder="e.g. Payment Processing" class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm text-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20" />
      </div>

      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500">Description <span class="text-red-500">*</span></label>
        <textarea formControlName="description" rows="4" placeholder="Briefly explain what this feature covers..." class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 text-sm text-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20"></textarea>
      </div>

      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-500">Display Order</label>
        <input type="number" min="0" formControlName="displayOrder" class="h-12 w-28 rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm text-slate-800 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20" />
        <p class="mt-2 text-xs text-slate-400">Controls the display order in the list</p>
      </div>

      <div class="flex items-center justify-end gap-4 pt-2">
        <button type="button" (click)="close()" [disabled]="isSubmitting" class="px-6 py-2.5 text-sm font-bold uppercase tracking-widest text-slate-500 transition-colors hover:text-slate-800">Cancel</button>
        <button type="submit" [disabled]="isSubmitting || featureForm.invalid || !modules.length" class="min-w-[165px] rounded-xl bg-primary px-8 py-3 text-sm font-bold uppercase tracking-widest text-white shadow-lg shadow-primary/20 transition-all hover:bg-primary/90 disabled:cursor-not-allowed disabled:opacity-50">
          <span *ngIf="isSubmitting">Saving...</span>
          <span *ngIf="!isSubmitting">Save Feature</span>
        </button>
      </div>
    </form>
  </div>
</div>
