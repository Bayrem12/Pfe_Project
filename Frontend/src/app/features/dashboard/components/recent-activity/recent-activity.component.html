<div class="bg-surface-container-lowest p-6 rounded-3xl shadow-[0_8px_30px_rgba(0,40,142,0.04)] border border-slate-50">
  <h4 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6">Recent Activity</h4>
  
  <div class="space-y-4">
    <div *ngFor="let activity of activities" class="flex gap-4 items-start">
      <div class="mt-1 w-2 h-2 rounded-full" [ngClass]="getActivityColor(activity.type)"></div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-bold text-on-surface truncate">{{ activity.title }}</p>
        <p class="text-[10px] text-on-surface-variant">{{ activity.description }}</p>
      </div>
    </div>
    
    <div *ngIf="activities.length === 0" class="text-center py-8 text-slate-400 text-sm">
      No recent activity
    </div>
  </div>
  
  <button class="w-full mt-6 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest text-primary border border-primary/10 hover:bg-primary/5 transition-colors">
    View All History
  </button>
</div>
