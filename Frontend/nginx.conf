server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse proxy: IA Agent API ───────────────────────────────────────────
    # Must come BEFORE the generic /api/ block (more specific prefix wins).
    location /api/ia/ {
        proxy_pass         http://ia-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow up to 5 min — ML models load lazily on first request
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Reverse proxy: IA Agent static reports / screenshots ─────────────────
    # ^~ prevents the regex location below (matching .png etc.) from taking over
    location ^~ /reports/ {
        proxy_pass         http://ia-agent:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Reverse proxy: .NET Backend API ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:5288;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # ── Static assets — long cache (Angular uses content-hashed filenames) ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Angular SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
