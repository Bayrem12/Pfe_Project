version: "3.8"

services:
  ia-service:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./trained_models:/app/trained_models
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    # GPU support — requires nvidia-container-toolkit on the host.
    # Harmless on machines without a GPU (container starts normally, models use CPU).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ia_test_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
